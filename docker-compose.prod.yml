services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: halal_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A celery_worker.celery worker --loglevel=info -P solo --concurrency=1
    env_file: .env
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A celery_worker.celery beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  pgdata:

version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: halal_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/alembic/versions/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./backend/alembic/versions/002_auth_tokens.sql:/docker-entrypoint-initdb.d/002_auth_tokens.sql
      - ./backend/alembic/versions/003_broker_connections.sql:/docker-entrypoint-initdb.d/003_broker_connections.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A celery_worker.celery worker --beat --loglevel=info -P solo
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:

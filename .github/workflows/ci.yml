name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t halal-trading-api ./backend

      - name: Build frontend
        run: docker build -t halal-trading-frontend ./frontend

      - name: Create .env
        run: cp .env.example .env

      - name: Validate docker compose
        run: docker compose -f docker-compose.prod.yml config
